!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R3
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface FastEthernet0/0
 ip address 10.255.3.2 255.255.255.252
 duplex auto
 speed auto
!
interface Serial0/0
 no ip address
 shutdown
 clock rate 2000000
!
interface FastEthernet0/1
 no ip address
 duplex auto
 speed auto
!
interface FastEthernet0/1.100
 encapsulation dot1Q 100
 ip address 10.3.100.1 255.255.255.0
!
interface FastEthernet0/1.110
 encapsulation dot1Q 110
 ip address 10.3.110.1 255.255.255.0
!
interface FastEthernet0/1.120
 encapsulation dot1Q 120
 ip address 10.3.120.1 255.255.255.0
!
interface FastEthernet0/1.130
 encapsulation dot1Q 130
 ip address 10.3.130.1 255.255.255.0
!
interface FastEthernet0/1.200
 encapsulation dot1Q 200
 ip address 10.3.200.1 255.255.255.0
!
interface Serial0/1
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/2
 no ip address
 shutdown
 clock rate 2000000
!
interface FastEthernet1/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface Serial2/0
 no ip address
 shutdown
 serial restart-delay 0
!
interface Serial2/1
 no ip address
 shutdown
 serial restart-delay 0
!
interface Serial2/2
 no ip address
 shutdown
 serial restart-delay 0
!
interface Serial2/3
 no ip address
 shutdown
 serial restart-delay 0
!
ip forward-protocol nd
ip route 10.1.10.0 255.255.255.0 10.255.3.1
ip route 10.1.20.0 255.255.255.0 10.255.3.1
ip route 10.1.30.0 255.255.255.0 10.255.3.1
ip route 10.1.40.0 255.255.255.0 10.255.3.1
ip route 10.2.50.0 255.255.255.0 10.255.3.1
ip route 10.2.60.0 255.255.255.0 10.255.3.1
ip route 10.2.70.0 255.255.255.0 10.255.3.1
ip route 10.2.80.0 255.255.255.0 10.255.3.1
ip route 10.2.90.0 255.255.255.0 10.255.3.1
!
!
no ip http server
no ip http secure-server
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
